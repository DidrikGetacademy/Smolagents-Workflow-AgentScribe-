          - If the broad-category query found nothing useful, try a more generic niche term
            (e.g. "best motivational speech short 2024" or "self improvement mindset shorts").
      3. Call `fetch_top_trending_youtube_videos` again with the new query.
      4. Repeat this re-query process up to 2 additional times per original query before
        falling back to first-principles metadata crafting without trending data.

    **Mixed results**: If a query returns some videos above and some below 100k views, keep
